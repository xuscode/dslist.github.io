<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DS查询系统</title>
    
    <!-- 主样式文件 -->
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>产品价格查询系统</h1>
            <p>快速查询产品详细信息和价格</p>
        </div>

        <div class="main-content">
            <div class="query-section">
                <h2>选择查询类型：</h2>
                
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="priceQuery" name="queryType" value="price" checked>
                        <label for="priceQuery">价格查询</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="roleAppQuery" name="queryType" value="roleApp">
                        <label for="roleAppQuery">角色APP查询</label>
                    </div>
                </div>

                <!-- 价格查询界面 -->
                <div id="priceSearchBox" class="search-box active">
                    <h3 style="margin-bottom: 15px; color: #667eea;">价格查询</h3>
                    <p style="margin-bottom: 15px; color: #666; font-size: 0.95em;">
                        支持搜索：产品名称、产品编号、短代码、产品组合等
                    </p>
                    <div class="search-input-group">
                        <input type="text" 
                               id="priceSearchInput" 
                               class="search-input" 
                               placeholder="输入关键词，如：CATIA、DMH、AUTOVUE...">
                        <button class="search-btn" onclick="searchPrice()">搜索</button>
                    </div>
                    <div id="priceResults" class="results-container"></div>
                </div>

                <!-- 角色APP查询界面 -->
                <div id="roleAppSearchBox" class="search-box">
                    <h3 style="margin-bottom: 15px; color: #667eea;">角色APP双向查询</h3>
                    
                    <!-- 查询模式切换 -->
                    <div class="mode-switch">
                        <button id="modeRoleToApp" class="active">角色 → APP</button>
                        <button id="modeAppToRole">APP → 角色</button>
                    </div>
                    
                    <p style="margin-bottom: 15px; color: #666; font-size: 0.95em;">
                        支持双向查询：输入角色名称查看包含的APP，或输入APP名称查看包含该角色的列表
                    </p>
                    <div class="search-input-group">
                        <input type="text" 
                               id="roleAppSearchInput" 
                               class="search-input" 
                               placeholder="输入角色名称，如：Building Design Engineer...">
                        <button class="search-btn" onclick="searchRoleApp()">搜索</button>
                    </div>
                    <div id="roleAppResults" class="results-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 按依赖顺序加载JavaScript模块 -->
    <!-- 1. 核心配置（最先加载） -->
    <script src="src/js/core/config.js"></script>
    
    <!-- 2. 工具函数 -->
    <script src="src/js/utils/helpers.js"></script>
    
    <!-- 3. 数据加载器 -->
    <script src="src/js/core/dataLoader.js"></script>
    
    <!-- 4. 模块注册表 -->
    <script src="src/js/core/moduleRegistry.js"></script>
    
    <!-- 5. 功能模块（依赖config、helpers、dataLoader、moduleRegistry） -->
    <script src="src/js/modules/priceQuery.js"></script>
    <script src="src/js/modules/roleAppQuery.js"></script>
    
    <!-- 6. 应用初始化器 -->
    <script src="src/js/core/app.js"></script>
    
    <!-- 7. 主入口（最后加载） -->
    <script src="src/js/main.js"></script>
</body>
</html>
